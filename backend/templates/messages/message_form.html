{% extends "base.html" %}
{% block title %}Compose Message - CRM System{% endblock %}
{% block content %}
<div class="form-page">
  <h2>Compose Message</h2>
  <form id="messageForm" class="crm-form">
    {% csrf_token %}
    <div class="form-group">
      <label for="recipient">Recipient Email</label>
      <input type="email" id="recipient" name="recipient" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" class="form-control" required>
    </div>
    <div class="form-group">
      <label for="body">Message</label>
      <textarea id="body" name="body" class="form-control" rows="6" required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Send</button>
    <a href="/messages/" class="btn btn-secondary">Cancel</a>
  </form>
  <div id="msgError" class="alert alert-danger" style="display:none"></div>
</div>

<script>
const token = localStorage.getItem("access_token");
if (!token) { window.location.href = "/login/"; }

document.getElementById("messageForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const data = {
    recipient_email: document.getElementById("recipient").value,
    subject: document.getElementById("subject").value,
    body: document.getElementById("body").value,
  };
  try {
    const res = await fetch("/api/messages/compose/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token,
      },
      body: JSON.stringify(data),
    });
    if (res.ok) {
      window.location.href = "/messages/";
    } else {
      const err = await res.json();
      document.getElementById("msgError").textContent = JSON.stringify(err);
      document.getElementById("msgError").style.display = "block";
    }
  } catch (e) {
    document.getElementById("msgError").textContent = "Network error";
    document.getElementById("msgError").style.display = "block";
  }
});
</script>
{% endblock %}
