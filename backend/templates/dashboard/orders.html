{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Natural Foods Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1b4332;
      --primary-dark: #081c15;
      --primary-light: #d8f3dc;
      --accent: #2ec4b6;
      --success: #2b9348;
      --danger: #e63946;
      --warning: #ffb703;
      --pending: #f39c12;
      --info: #028090;
      --bg-app: #f4f7f6;
      --bg-sidebar: #1b4332;
      --sidebar-text: #d8f3dc;
      --sidebar-active: #ffffff;
      --sidebar-active-bg: rgba(255, 255, 255, 0.12);
      --bg-header: rgba(255, 255, 255, 0.85);
      --bg-card: #ffffff;
      --text-main: #2b3e34;
      --text-muted: #6b7a72;
      --border-color: rgba(0, 0, 0, 0.08);
      --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 10px 25px rgba(27, 67, 50, 0.06);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08);
    }
    body.dark-mode {
      --bg-app: #08110c;
      --bg-sidebar: #050d09;
      --sidebar-text: #95d5b2;
      --sidebar-active: #52b788;
      --sidebar-active-bg: rgba(82, 183, 136, 0.15);
      --bg-header: rgba(11, 25, 18, 0.85);
      --bg-card: #0d1e15;
      --text-main: #ecfdf5;
      --text-muted: #839c8e;
      --border-color: rgba(255, 255, 255, 0.06);
      --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.15);
      --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.25);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.35);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    body { background-color: var(--bg-app); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    .app-layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px; background-color: var(--bg-sidebar); padding: 24px;
      display: flex; flex-direction: column; position: fixed;
      height: 100vh; z-index: 100;
      border-right: 1px solid var(--border-color);
    }
    .sidebar-brand { display: flex; align-items: center; gap: 12px; color: #ffffff; font-size: 1.4rem; font-weight: 800; margin-bottom: 40px; letter-spacing: -0.5px; }
    .sidebar-brand i { color: var(--accent); filter: drop-shadow(0 0 5px rgba(46,196,182,0.6)); }
    .sidebar-nav { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .nav-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; color: var(--sidebar-text); font-size: 0.95rem; font-weight: 500; border-radius: 12px; cursor: pointer; transition: all 0.25s cubic-bezier(0.4,0,0.2,1); text-decoration: none; }
    .nav-item:hover { color: #ffffff; background-color: rgba(255,255,255,0.05); transform: translateX(4px); }
    .nav-item.active { color: var(--sidebar-active); background-color: var(--sidebar-active-bg); font-weight: 600; box-shadow: inset 3px 0 0 var(--accent); }
    .nav-item i { font-size: 1.1rem; width: 20px; text-align: center; }
    .content-area { flex: 1; margin-left: 260px; display: flex; flex-direction: column; min-height: 100vh; }
    .header { height: 75px; background-color: var(--bg-header); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 90; border-bottom: 1px solid var(--border-color); }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-left h2 { font-size: 1.3rem; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .action-btn { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border-color); background-color: var(--bg-card); color: var(--text-main); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.25s; text-decoration: none; }
    .action-btn:hover { background-color: var(--primary-light); color: var(--primary); border-color: var(--accent); transform: translateY(-2px); }
    .action-btn-main { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 12px; font-size: 0.88rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; border: none; outline: none; }
    .btn-green { background-color: var(--primary); color: #ffffff; }
    .btn-green:hover { background-color: var(--success); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(43,147,72,0.25); }
    .btn-outline { background: none; border: 1px solid var(--border-color); color: var(--text-main); }
    .btn-outline:hover { background-color: var(--bg-app); border-color: var(--text-muted); }
    .btn-danger { background-color: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: 0.85; transform: translateY(-2px); }
    .main-body { flex: 1; padding: 32px; max-width: 1400px; width: 100%; margin: 0 auto; }
    .content-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; padding: 28px; box-shadow: var(--shadow-sm); margin-bottom: 30px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .card-title { font-size: 1.15rem; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
    .card-title i { color: var(--success); }
    .search-box { position: relative; width: 100%; max-width: 320px; }
    .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; }
    .search-box input { width: 100%; background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 10px 16px 10px 42px; border-radius: 12px; font-size: 0.9rem; color: var(--text-main); outline: none; }
    .search-box input:focus { border-color: var(--accent); }
    .table-responsive { width: 100%; overflow-x: auto; }
    .premium-table { width: 100%; border-collapse: collapse; text-align: left; }
    .premium-table th { padding: 16px 20px; border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .premium-table td { padding: 18px 20px; border-bottom: 1px solid var(--border-color); color: var(--text-main); font-size: 0.92rem; vertical-align: middle; }
    .premium-table tr { transition: background-color 0.2s; }
    .premium-table tr:hover { background-color: rgba(46, 196, 182, 0.03); }
    .badge-tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; text-transform: capitalize; }
    .badge-win { background-color: rgba(43, 147, 72, 0.12); color: var(--success); }
    .badge-loss { background-color: rgba(230, 57, 70, 0.12); color: var(--danger); }
    .badge-pending { background-color: rgba(243, 156, 18, 0.12); color: var(--pending); }
    .badge-order_processing { background-color: rgba(2, 128, 144, 0.12); color: var(--info); }
    .badge-shipped { background-color: rgba(46, 196, 182, 0.12); color: var(--accent); }
    .badge-delivered { background-color: rgba(43, 147, 72, 0.12); color: var(--success); }
    .badge-cancelled { background-color: rgba(230, 57, 70, 0.12); color: var(--danger); }
    .order-detail-card { display: none; }
    .order-detail-card.active { display: block; animation: fadeIn 0.3s ease; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-mini-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 14px; padding: 16px; }
    .stat-mini-box .label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.3px; }
    .stat-mini-box .value { font-size: 1.3rem; font-weight: 700; color: var(--text-main); margin-top: 4px; }
    .detail-field { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
    .detail-field strong { color: var(--text-main); }
    .detail-section { background: var(--bg-app); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); text-decoration: none; font-size: 0.85rem; font-weight: 600; margin-bottom: 16px; cursor: pointer; }
    .back-link:hover { text-decoration: underline; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state i { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.4; }
    .toast-notification { position: fixed; bottom: 30px; right: 30px; background-color: var(--primary); color: #ffffff; padding: 16px 24px; border-radius: 16px; box-shadow: var(--shadow-lg); z-index: 2000; display: none; align-items: center; gap: 12px; font-weight: 600; font-size: 0.9rem; border-left: 5px solid var(--accent); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .delivery-track { display: flex; align-items: center; gap: 0; margin: 20px 0; padding: 0; }
    .delivery-step { flex: 1; text-align: center; position: relative; }
    .delivery-step .step-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 1rem; border: 2px solid var(--border-color); background: var(--bg-card); color: var(--text-muted); transition: all 0.3s; }
    .delivery-step.completed .step-icon { background: var(--success); border-color: var(--success); color: #fff; }
    .delivery-step.active .step-icon { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 0 4px rgba(46,196,182,0.2); }
    .delivery-step .step-label { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
    .delivery-step.completed .step-label { color: var(--success); }
    .delivery-step.active .step-label { color: var(--accent); }
    .delivery-step:not(:last-child)::after { content: ''; position: absolute; top: 20px; left: 60%; width: 80%; height: 2px; background: var(--border-color); z-index: -1; }
    .delivery-step.completed:not(:last-child)::after { background: var(--success); }
    .delivery-step.active:not(:last-child)::after { background: var(--accent); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.88rem; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
    .form-control { width: 100%; background-color: var(--bg-app); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px 16px; color: var(--text-main); outline: none; font-size: 0.92rem; transition: all 0.2s; font-family: 'Outfit', sans-serif; }
    .form-control:focus { border-color: var(--accent); background-color: var(--bg-card); box-shadow: 0 0 0 3px rgba(46,196,182,0.15); }
    select.form-control { cursor: pointer; }
    .modal-overlay { position: fixed; inset: 0; background-color: rgba(8,17,12,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.active { display: flex; }
    .modal-content { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 28px; width: 100%; max-width: 520px; box-shadow: var(--shadow-lg); padding: 32px; position: relative; animation: scaleIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .modal-title { font-size: 1.3rem; font-weight: 700; color: var(--text-main); }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.4rem; cursor: pointer; transition: color 0.2s; }
    .modal-close:hover { color: var(--danger); }
    .action-btn-icon { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .action-btn-icon:hover { transform: scale(1.05); }
    .btn-edit-icon:hover { background-color: var(--info); color: white; border-color: var(--info); }
    .btn-delete-icon:hover { background-color: var(--danger); color: white; border-color: var(--danger); }
    .btn-view-icon:hover { background-color: var(--accent); color: white; border-color: var(--accent); }
    .btn-pdf-icon:hover { background-color: var(--danger); color: white; border-color: var(--danger); }
    @media (max-width: 991px) { .sidebar { transform: translateX(-100%); } .sidebar.active { transform: translateX(0); } .content-area { margin-left: 0; } }
    @media (max-width: 575px) { .main-body { padding: 16px; } .header { padding: 0 16px; } }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="{% static 'images/dention.png' %}" alt="Logo"
        style="width:32px;height:32px;object-fit:contain;border-radius:6px"
        onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
      <i class="fas fa-leaf" style="display:none"></i>
      <span>Natural Foods</span>
    </div>
    <ul class="sidebar-nav">
      <a href="/dashboard/" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
      <a href="/dashboard/messages/" class="nav-item"><i class="fas fa-envelope"></i><span>Messages</span></a>
      <a href="/dashboard/orders/" class="nav-item active"><i class="fas fa-shopping-basket"></i><span>Orders</span></a>
    </ul>
  </aside>

  <div class="content-area">
    <header class="header">
      <div class="header-left">
        <button class="action-btn" id="sidebarToggle" style="border-radius:12px;width:38px;height:38px"><i class="fas fa-bars"></i></button>
        <h2><i class="fas fa-shopping-basket" style="color:var(--accent);margin-right:8px"></i>Orders</h2>
      </div>
      <div class="header-right">
        <button class="action-btn" id="darkModeToggle"><i class="fas fa-moon" id="darkModeIcon"></i></button>
      </div>
    </header>

    <main class="main-body">
      <div class="stats-row" id="statsRow"></div>

      <div class="content-card" id="ordersListView">
        <div class="card-header">
          <div class="card-title"><i class="fas fa-list"></i><span>All Orders</span></div>
          <div style="display:flex;gap:12px;align-items:center">
            <div class="search-box">
              <i class="fas fa-search"></i>
              <input type="text" id="orderSearch" placeholder="Search by ID or customer...">
            </div>
          </div>
        </div>
        <div class="table-responsive">
          <table class="premium-table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Status</th>
                <th>Delivery</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
      </div>

      <div class="content-card order-detail-card" id="orderDetailView">
        <a class="back-link" id="backToListBtn"><i class="fas fa-arrow-left"></i> Back to all orders</a>
        <div id="orderDetailContent"></div>
      </div>
    </main>
  </div>
</div>

<!-- Edit Order Modal -->
<div class="modal-overlay" id="editOrderModal">
  <div class="modal-content">
    <div class="modal-header-section">
      <h3 class="modal-title">Edit Order</h3>
      <button class="modal-close" id="editModalClose">&times;</button>
    </div>
    <form id="editOrderForm">
      <input type="hidden" id="editOrderId">
      <div class="form-group">
        <label>Customer Name</label>
        <input type="text" id="editCustomerName" class="form-control" required>
      </div>
      <div class="form-row" style="display:flex;gap:12px">
        <div class="form-group" style="flex:1">
          <label>Product Name</label>
          <input type="text" id="editProductName" class="form-control">
        </div>
        <div class="form-group" style="flex:0 0 80px">
          <label>Qty</label>
          <input type="number" id="editQuantity" class="form-control" min="1">
        </div>
      </div>
      <div class="form-row" style="display:flex;gap:12px">
        <div class="form-group" style="flex:1">
          <label>Amount ($)</label>
          <input type="number" step="0.01" id="editAmount" class="form-control" required>
        </div>
        <div class="form-group" style="flex:1">
          <label>Date</label>
          <input type="date" id="editDate" class="form-control" required>
        </div>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="editStatus" class="form-control">
          <option value="pending">Pending</option>
          <option value="win">Win</option>
          <option value="loss">Loss</option>
        </select>
      </div>
      <div class="form-group">
        <label>Delivery Person Name</label>
        <input type="text" id="editDeliveryPerson" class="form-control" placeholder="Person responsible for delivery">
      </div>
      <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:20px">
        <button type="button" class="action-btn-main btn-outline" id="editCancelBtn">Cancel</button>
        <button type="submit" class="action-btn-main btn-green">Update Order</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-notification" id="globalToast">
  <i class="fas fa-check-circle" id="toastIcon"></i>
  <span id="toastMsg">Done!</span>
</div>

<script>
function getCookie(name) {
  let val = null;
  if (document.cookie && document.cookie !== '') {
    document.cookie.split(';').some(c => {
      const t = c.trim();
      if (t.startsWith(name + '=')) { val = decodeURIComponent(t.substring(name.length + 1)); return true; }
    });
  }
  return val;
}

function showToast(msg, isError) {
  const t = document.getElementById('globalToast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').className = isError ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
  t.style.borderLeftColor = isError ? 'var(--warning)' : 'var(--accent)';
  t.style.backgroundColor = isError ? 'var(--danger)' : 'var(--primary)';
  t.style.display = 'flex';
  setTimeout(() => t.style.display = 'none', 3000);
}

function getToken() {
  return localStorage.getItem('access_token') || localStorage.getItem('naturalfoods_access_token');
}

async function api(url, method, body) {
  let token = getToken();
  const h = { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const c = { method, headers: h };
  if (body) c.body = JSON.stringify(body);
  const res = await fetch(url, c);
  if ((res.status === 401 || res.status === 403) && token) {
    localStorage.removeItem('access_token');
    localStorage.removeItem('naturalfoods_access_token');
    localStorage.removeItem('refresh_token');
    localStorage.removeItem('naturalfoods_refresh_token');
    window.location.href = '/login/';
  }
  return res;
}

function formatCurrency(n) {
  return '$' + parseFloat(n).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

const deliverySteps = ['order_processing', 'shipped', 'delivered', 'cancelled'];
const deliveryLabels = { order_processing: 'Processing', shipped: 'Shipped', delivered: 'Delivered', cancelled: 'Cancelled' };
const deliveryIcons = { order_processing: 'fa-cog', shipped: 'fa-truck', delivered: 'fa-check-circle', cancelled: 'fa-times-circle' };

function deliveryTrackHtml(current, person) {
  const idx = deliverySteps.indexOf(current);
  return '<div style="margin-bottom:12px"><strong style="font-size:0.85rem">Delivery Person:</strong> <span style="color:var(--accent);font-weight:600">' + (person || 'Not assigned') + '</span></div>' +
    '<div class="delivery-track">' +
    deliverySteps.map((s, i) => {
      let cls = 'delivery-step';
      if (i < idx) cls += ' completed';
      else if (s === current) cls += ' active';
      return '<div class="' + cls + '"><div class="step-icon"><i class="fas ' + deliveryIcons[s] + '"></i></div><div class="step-label">' + deliveryLabels[s] + '</div></div>';
    }).join('') +
    '</div>';
}

async function loadOrders(query) {
  try {
    const url = '/api/dashboard/orders/' + (query ? '?search=' + encodeURIComponent(query) : '');
    const res = await api(url);
    if (!res.ok) { if (res.status === 401) window.location.href = '/login/'; return; }
    const orders = await res.json();
    const tbody = document.getElementById('ordersBody');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted)">No orders found</td></tr>';
      return;
    }
    tbody.innerHTML = orders.map(o => `
      <tr id="order-row-${o.id}">
        <td style="font-weight:700;color:var(--accent)">${o.order_id}</td>
        <td style="font-weight:600">${o.customer_name}</td>
        <td>${o.product_name || '-'}</td>
        <td>${o.quantity || '-'}</td>
        <td style="font-weight:700;color:var(--primary)">${formatCurrency(o.amount)}</td>
        <td>${new Date(o.date).toLocaleDateString()}</td>
        <td><span class="badge-tag badge-${o.status}">${o.status}</span></td>
        <td><span class="badge-tag badge-${o.delivery_status || 'order_processing'}">${deliveryLabels[o.delivery_status] || 'Processing'}</span></td>
        <td>
          <div style="display:flex;gap:4px">
            <button class="action-btn-icon btn-view-icon" onclick="showDetail(${o.id})" title="View Delivery"><i class="fas fa-eye"></i></button>
            <button class="action-btn-icon btn-edit-icon" onclick="openEditOrder(${o.id})" title="Edit"><i class="fas fa-pen"></i></button>
            <button class="action-btn-icon btn-delete-icon" onclick="deleteOrder(${o.id})" title="Delete"><i class="fas fa-trash-alt"></i></button>
            <button class="action-btn-icon btn-pdf-icon" onclick="downloadInvoice(${o.id})" title="Invoice PDF"><i class="fas fa-file-invoice"></i></button>
          </div>
        </td>
      </tr>
    `).join('');
  } catch (e) { console.error(e); }
}

async function loadStats() {
  try {
    const res = await api('/api/dashboard/stats/');
    if (!res.ok) return;
    const d = await res.json();
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-mini-box"><div class="label">Total Sales</div><div class="value">${formatCurrency(d.total_sales)}</div></div>
      <div class="stat-mini-box"><div class="label">Today</div><div class="value">${formatCurrency(d.today_sales)}</div></div>
      <div class="stat-mini-box"><div class="label">This Month</div><div class="value">${formatCurrency(d.month_sales)}</div></div>
      <div class="stat-mini-box"><div class="label">Total Orders</div><div class="value">${d.total_orders}</div></div>
      <div class="stat-mini-box"><div class="label">Wins</div><div class="value" style="color:var(--success)">${d.sales_win}</div></div>
      <div class="stat-mini-box"><div class="label">Losses</div><div class="value" style="color:var(--danger)">${d.sales_loss}</div></div>
    `;
  } catch (e) { console.error(e); }
}

async function showDetail(id) {
  try {
    const res = await api('/api/dashboard/orders/' + id + '/');
    if (!res.ok) return;
    const o = await res.json();
    const ds = o.delivery_status || 'order_processing';
    document.getElementById('ordersListView').style.display = 'none';
    document.getElementById('orderDetailView').classList.add('active');
    document.getElementById('orderDetailContent').innerHTML = `
      <div style="margin-bottom:20px">
        <h3 style="font-size:1.3rem;font-weight:700;color:var(--accent);margin-bottom:4px">${o.order_id}</h3>
        <span class="badge-tag badge-${o.status}" style="font-size:0.85rem">${o.status.toUpperCase()}</span>
      </div>

      <div class="detail-section">
        <h4 style="font-size:0.95rem;font-weight:600;margin-bottom:12px;color:var(--text-main)"><i class="fas fa-truck"></i> Delivery Tracking</h4>
        ${deliveryTrackHtml(ds, o.delivery_person_name)}
        <form id="updateDeliveryForm" style="margin-top:16px">
          <input type="hidden" id="detailOrderId" value="${o.id}">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:end">
            <div class="form-group" style="flex:1;min-width:150px;margin-bottom:0">
              <label style="font-size:0.8rem">Update Delivery Status</label>
              <select id="detailDeliveryStatus" class="form-control">
                <option value="order_processing" ${ds === 'order_processing' ? 'selected' : ''}>Order Processing</option>
                <option value="shipped" ${ds === 'shipped' ? 'selected' : ''}>Shipped</option>
                <option value="delivered" ${ds === 'delivered' ? 'selected' : ''}>Delivered</option>
                <option value="cancelled" ${ds === 'cancelled' ? 'selected' : ''}>Cancelled</option>
              </select>
            </div>
            <div class="form-group" style="flex:1;min-width:150px;margin-bottom:0">
              <label style="font-size:0.8rem">Delivery Person</label>
              <input type="text" id="detailDeliveryPerson" class="form-control" value="${o.delivery_person_name || ''}" placeholder="Name">
            </div>
            <button type="submit" class="action-btn-main btn-green" style="padding:8px 16px;font-size:0.8rem"><i class="fas fa-sync"></i> Update</button>
          </div>
        </form>
      </div>

      <div class="detail-section">
        <h4 style="font-size:0.95rem;font-weight:600;margin-bottom:12px;color:var(--text-main)"><i class="fas fa-info-circle"></i> Order Details</h4>
        <div class="detail-field"><strong>Customer:</strong> ${o.customer_name}</div>
        <div class="detail-field"><strong>Product:</strong> ${o.product_name || '-'}</div>
        <div class="detail-field"><strong>Quantity:</strong> ${o.quantity || '-'}</div>
        <div class="detail-field"><strong>Amount:</strong> ${formatCurrency(o.amount)}</div>
        <div class="detail-field"><strong>Date:</strong> ${new Date(o.date).toLocaleDateString()}</div>
        ${o.user_email ? '<div class="detail-field"><strong>User Email:</strong> ' + o.user_email + '</div>' : ''}
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="action-btn-main btn-green" onclick="downloadInvoice(${o.id})" style="padding:10px 24px"><i class="fas fa-file-invoice"></i> Download Invoice PDF</button>
        <button class="action-btn-main btn-outline" onclick="openEditOrder(${o.id})"><i class="fas fa-pen"></i> Edit Order</button>
      </div>
    `;

    document.getElementById('updateDeliveryForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const oid = document.getElementById('detailOrderId').value;
      const ds = document.getElementById('detailDeliveryStatus').value;
      const dp = document.getElementById('detailDeliveryPerson').value;
      try {
        const res = await api('/api/dashboard/orders/' + oid + '/', 'PATCH', { delivery_status: ds, delivery_person_name: dp });
        if (res.ok) {
          showToast('Delivery status updated!');
          showDetail(parseInt(oid));
          loadOrders();
        } else {
          showToast('Update failed', true);
        }
      } catch (e) { console.error(e); }
    });
  } catch (e) { console.error(e); }
}

function downloadInvoice(id) {
  const token = getToken();
  const url = '/api/dashboard/orders/' + id + '/receipt/?token=' + encodeURIComponent(token) + '&format=pdf';
  window.open(url, '_blank', 'width=800,height=900');
}

function downloadReceipt(id) { downloadInvoice(id); }

async function openEditOrder(id) {
  try {
    const res = await api('/api/dashboard/orders/' + id + '/');
    if (!res.ok) return;
    const o = await res.json();
    document.getElementById('editOrderId').value = o.id;
    document.getElementById('editCustomerName').value = o.customer_name;
    document.getElementById('editProductName').value = o.product_name || '';
    document.getElementById('editQuantity').value = o.quantity || 1;
    document.getElementById('editAmount').value = o.amount;
    document.getElementById('editDate').value = o.date;
    document.getElementById('editStatus').value = o.status;
    document.getElementById('editDeliveryPerson').value = o.delivery_person_name || '';
    document.getElementById('editOrderModal').classList.add('active');
  } catch (e) { console.error(e); }
}

async function deleteOrder(id) {
  if (!confirm('Are you sure you want to delete this order?')) return;
  try {
    const res = await api('/api/dashboard/orders/' + id + '/', 'DELETE');
    if (res.status === 204 || res.ok) {
      showToast('Order deleted successfully');
      const row = document.getElementById('order-row-' + id);
      if (row) { row.style.opacity = '0'; setTimeout(() => row.remove(), 300); }
      else loadOrders();
    }
  } catch (e) { console.error(e); }
}

document.getElementById('backToListBtn').addEventListener('click', function() {
  document.getElementById('orderDetailView').classList.remove('active');
  document.getElementById('ordersListView').style.display = 'block';
});

document.getElementById('orderSearch').addEventListener('input', function() { loadOrders(this.value); });

document.getElementById('editOrderForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const id = document.getElementById('editOrderId').value;
  const data = {
    customer_name: document.getElementById('editCustomerName').value,
    product_name: document.getElementById('editProductName').value,
    quantity: parseInt(document.getElementById('editQuantity').value) || 1,
    amount: parseFloat(document.getElementById('editAmount').value),
    date: document.getElementById('editDate').value,
    status: document.getElementById('editStatus').value,
    delivery_person_name: document.getElementById('editDeliveryPerson').value,
  };
  try {
    const res = await api('/api/dashboard/orders/' + id + '/', 'PATCH', data);
    if (res.ok) {
      showToast('Order updated successfully!');
      document.getElementById('editOrderModal').classList.remove('active');
      loadOrders();
      if (document.getElementById('orderDetailView').classList.contains('active')) showDetail(parseInt(id));
    } else {
      const err = await res.json();
      showToast(Object.values(err).flat().join(', ') || 'Update failed', true);
    }
  } catch (e) { console.error(e); }
});

document.getElementById('editModalClose').addEventListener('click', () => document.getElementById('editOrderModal').classList.remove('active'));
document.getElementById('editCancelBtn').addEventListener('click', () => document.getElementById('editOrderModal').classList.remove('active'));
document.getElementById('editOrderModal').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('active'); });

const themeBtn = document.getElementById('darkModeToggle');
const themeIcon = document.getElementById('darkModeIcon');
if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); themeIcon.className = 'fas fa-sun'; }
themeBtn.addEventListener('click', function() {
  document.body.classList.toggle('dark-mode');
  const d = document.body.classList.contains('dark-mode');
  localStorage.setItem('theme', d ? 'dark' : 'light');
  themeIcon.className = d ? 'fas fa-sun' : 'fas fa-moon';
});
document.getElementById('sidebarToggle').addEventListener('click', function() { document.getElementById('sidebar').classList.toggle('active'); });

if (!getToken()) { window.location.href = '/login/'; }
loadOrders();
loadStats();
</script>
</body>
</html>
