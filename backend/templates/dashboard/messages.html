{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - Natural Foods Admin</title>
  <link rel="icon" href="/static/images/dention.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1b4332;
      --primary-dark: #081c15;
      --primary-light: #d8f3dc;
      --accent: #2ec4b6;
      --success: #2b9348;
      --danger: #e63946;
      --warning: #ffb703;
      --pending: #f39c12;
      --info: #028090;
      --bg-app: #f4f7f6;
      --bg-sidebar: #1b4332;
      --sidebar-text: #d8f3dc;
      --sidebar-active: #ffffff;
      --sidebar-active-bg: rgba(255, 255, 255, 0.12);
      --bg-header: rgba(255, 255, 255, 0.85);
      --bg-card: #ffffff;
      --text-main: #2b3e34;
      --text-muted: #6b7a72;
      --border-color: rgba(0, 0, 0, 0.08);
      --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 10px 25px rgba(27, 67, 50, 0.06);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08);
    }
    body.dark-mode {
      --bg-app: #08110c;
      --bg-sidebar: #050d09;
      --sidebar-text: #95d5b2;
      --sidebar-active: #52b788;
      --sidebar-active-bg: rgba(82, 183, 136, 0.15);
      --bg-header: rgba(11, 25, 18, 0.85);
      --bg-card: #0d1e15;
      --text-main: #ecfdf5;
      --text-muted: #839c8e;
      --border-color: rgba(255, 255, 255, 0.06);
      --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.15);
      --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.25);
      --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.35);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    body {
      background-color: var(--bg-app); color: var(--text-main);
      min-height: 100vh; overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    .app-layout {
      display: flex; min-height: 100vh;
    }
    .sidebar {
      width: 260px; background-color: var(--bg-sidebar); padding: 24px;
      display: flex; flex-direction: column; position: fixed;
      height: 100vh; z-index: 100;
      border-right: 1px solid var(--border-color);
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 12px;
      color: #ffffff; font-size: 1.4rem; font-weight: 800;
      margin-bottom: 40px; letter-spacing: -0.5px;
    }
    .sidebar-brand i { color: var(--accent); filter: drop-shadow(0 0 5px rgba(46,196,182,0.6)); }
    .sidebar-nav { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .nav-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; color: var(--sidebar-text);
      font-size: 0.95rem; font-weight: 500;
      border-radius: 12px; cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      text-decoration: none;
    }
    .nav-item:hover { color: #ffffff; background-color: rgba(255,255,255,0.05); transform: translateX(4px); }
    .nav-item.active { color: var(--sidebar-active); background-color: var(--sidebar-active-bg); font-weight: 600; box-shadow: inset 3px 0 0 var(--accent); }
    .nav-item i { font-size: 1.1rem; width: 20px; text-align: center; }
    .content-area { flex: 1; margin-left: 260px; display: flex; flex-direction: column; min-height: 100vh; }
    .header {
      height: 75px; background-color: var(--bg-header);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      padding: 0 32px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 90;
      border-bottom: 1px solid var(--border-color);
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-left h2 { font-size: 1.3rem; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .action-btn {
      width: 42px; height: 42px; border-radius: 50%;
      border: 1px solid var(--border-color); background-color: var(--bg-card);
      color: var(--text-main); display: flex; align-items: center;
      justify-content: center; cursor: pointer; transition: all 0.25s;
    }
    .action-btn:hover { background-color: var(--primary-light); color: var(--primary); border-color: var(--accent); transform: translateY(-2px); }
    .action-btn-main {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 12px;
      font-size: 0.88rem; font-weight: 600; cursor: pointer;
      text-decoration: none; transition: all 0.2s; border: none; outline: none;
    }
    .btn-green { background-color: var(--primary); color: #ffffff; }
    .btn-green:hover { background-color: var(--success); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(43,147,72,0.25); }
    .btn-outline { background: none; border: 1px solid var(--border-color); color: var(--text-main); }
    .btn-outline:hover { background-color: var(--bg-app); border-color: var(--text-muted); }
    .main-body { flex: 1; padding: 32px; max-width: 1200px; width: 100%; margin: 0 auto; }
    .content-card {
      background-color: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 24px; padding: 28px; box-shadow: var(--shadow-sm); margin-bottom: 30px;
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .card-title {
      font-size: 1.15rem; font-weight: 700; color: var(--text-main);
      display: flex; align-items: center; gap: 10px;
    }
    .card-title i { color: var(--success); }
    .tab-group { display: flex; gap: 8px; }
    .tab-btn {
      padding: 8px 20px; border-radius: 30px; border: 1px solid var(--border-color);
      background: var(--bg-card); color: var(--text-muted); font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif;
    }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--text-main); }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
    .msg-list { display: flex; flex-direction: column; gap: 8px; }
    .msg-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px; border-radius: 14px; cursor: pointer;
      border: 1px solid var(--border-color); transition: all 0.2s;
      background: var(--bg-card);
    }
    .msg-item:hover { border-color: var(--accent); background-color: var(--bg-app); transform: translateX(4px); }
    .msg-item.unread { border-left: 3px solid var(--accent); background-color: rgba(46,196,182,0.04); }
    .msg-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      display: flex; align-items: center; justify-content: center;
      color: var(--primary); font-weight: 700; font-size: 1rem; flex-shrink: 0;
    }
    .msg-body { flex: 1; min-width: 0; }
    .msg-sender { font-size: 0.95rem; font-weight: 600; color: var(--text-main); }
    .msg-subject { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-preview { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-date { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .msg-status { font-size: 0.65rem; color: var(--accent); font-weight: 600; }
    .msg-detail-view { display: none; }
    .msg-detail-view.active { display: block; animation: fadeIn 0.3s ease; }
    .msg-detail-header { margin-bottom: 20px; }
    .msg-detail-field { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
    .msg-detail-field strong { color: var(--text-main); }
    .msg-detail-body {
      padding: 20px; background: var(--bg-app); border-radius: 14px;
      font-size: 0.95rem; line-height: 1.6; color: var(--text-main);
      margin-bottom: 20px; white-space: pre-wrap;
    }
    .reply-item {
      padding: 14px; background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 12px; margin-bottom: 10px;
    }
    .reply-item small { color: var(--text-muted); }
    .reply-item p { margin-top: 6px; font-size: 0.9rem; white-space: pre-wrap; }
    .reply-form { margin-top: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.88rem; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
    .form-control {
      width: 100%; background-color: var(--bg-app); border: 1px solid var(--border-color);
      border-radius: 12px; padding: 12px 16px; color: var(--text-main);
      outline: none; font-size: 0.92rem; transition: all 0.2s; font-family: 'Outfit', sans-serif;
    }
    .form-control:focus { border-color: var(--accent); background-color: var(--bg-card); box-shadow: 0 0 0 3px rgba(46,196,182,0.15); }
    textarea.form-control { resize: vertical; min-height: 100px; }
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state i { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.4; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--accent); text-decoration: none; font-size: 0.85rem;
      font-weight: 600; margin-bottom: 16px; cursor: pointer;
    }
    .back-link:hover { text-decoration: underline; }
    .toast-notification {
      position: fixed; bottom: 30px; right: 30px;
      background-color: var(--primary); color: #ffffff;
      padding: 16px 24px; border-radius: 16px;
      box-shadow: var(--shadow-lg); z-index: 2000;
      display: none; align-items: center; gap: 12px;
      font-weight: 600; font-size: 0.9rem;
      border-left: 5px solid var(--accent);
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 991px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); }
      .content-area { margin-left: 0; }
    }
    @media (max-width: 575px) {
      .main-body { padding: 16px; }
      .header { padding: 0 16px; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="{% static 'images/dention.png' %}" alt="Logo"
        style="width:32px;height:32px;object-fit:contain;border-radius:6px"
        onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
      <i class="fas fa-leaf" style="display:none"></i>
      <span>Natural Foods</span>
    </div>
    <ul class="sidebar-nav">
      <a href="/dashboard/" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
      <a href="/dashboard/" class="nav-item"><i class="fas fa-chart-pie"></i><span>Analytics</span></a>
      <a href="/dashboard/" class="nav-item"><i class="fas fa-carrot"></i><span>Products</span></a>
      <a href="/dashboard/" class="nav-item"><i class="fas fa-shopping-basket"></i><span>Orders</span></a>
      <a href="/dashboard/" class="nav-item"><i class="fas fa-bell"></i><span>Notifications</span></a>
      <a href="/dashboard/" class="nav-item"><i class="fas fa-users"></i><span>Customers</span></a>
    </ul>
  </aside>

  <div class="content-area">
    <header class="header">
      <div class="header-left">
        <button class="action-btn" id="sidebarToggle" style="border-radius:12px;width:38px;height:38px"><i class="fas fa-bars"></i></button>
        <h2><i class="fas fa-envelope" style="color:var(--accent);margin-right:8px"></i>Messages</h2>
      </div>
      <div class="header-right">
        <button class="action-btn" id="darkModeToggle" title="Toggle Dark/Light Mode">
          <i class="fas fa-moon" id="darkModeIcon"></i>
        </button>
      </div>
    </header>

    <main class="main-body">
      <div class="content-card">
        <div class="card-header">
          <div class="tab-group">
            <button class="tab-btn active" data-tab="inbox">Inbox <span id="unreadBadge" class="badge-tag" style="font-size:0.65rem;padding:2px 8px;display:none">0</span></button>
          </div>
          <div></div>
        </div>

        <!-- Inbox Tab -->
        <div class="tab-content active" id="tab-inbox">
          <div class="msg-list" id="inboxList"></div>
        </div>

        <!-- Message Detail View (hidden by default, shown when clicking a message) -->
        <div class="msg-detail-view" id="msgDetailView">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <a class="back-link" id="backToListBtn"><i class="fas fa-arrow-left"></i> Back to messages</a>
            <button class="action-btn-main btn-outline" onclick="deleteMessage(selectedMsgId)" style="color:var(--danger);border-color:var(--danger)"><i class="fas fa-trash"></i> Delete</button>
          </div>
          <div class="msg-detail-header">
            <h3 id="detailSubject" style="font-size:1.1rem;font-weight:700;margin-bottom:8px"></h3>
            <div class="msg-detail-field"><strong>From:</strong> <span id="detailFrom"></span></div>
            <div class="msg-detail-field"><strong>To:</strong> <span id="detailTo"></span></div>
            <div class="msg-detail-field"><strong>Date:</strong> <span id="detailDate"></span></div>
          </div>
          <div class="msg-detail-body" id="detailBody"></div>
          <div id="detailReplies"></div>
          <div class="reply-form" id="replySection">
            <h4 style="font-size:1rem;font-weight:600;margin-bottom:12px"><i class="fas fa-reply"></i> Reply</h4>
            <form id="replyForm">
              <input type="hidden" id="replyMsgId">
              <input type="hidden" id="replySenderEmail">
              <input type="hidden" id="replySubject">
              <div class="form-group">
                <textarea id="replyBody" class="form-control" rows="4" placeholder="Write your reply..." required></textarea>
              </div>
              <button type="submit" class="action-btn-main btn-green"><i class="fas fa-paper-plane"></i> Send Reply</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="toast-notification" id="globalToast">
  <i class="fas fa-check-circle" id="toastIcon"></i>
  <span id="toastMsg">Done!</span>
</div>

<script>
function getCookie(name) {
  let val = null;
  if (document.cookie && document.cookie !== '') {
    document.cookie.split(';').some(c => {
      const t = c.trim();
      if (t.startsWith(name + '=')) { val = decodeURIComponent(t.substring(name.length + 1)); return true; }
    });
  }
  return val;
}

function showToast(msg, isError) {
  const t = document.getElementById('globalToast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').className = isError ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
  t.style.borderLeftColor = isError ? 'var(--warning)' : 'var(--accent)';
  t.style.backgroundColor = isError ? 'var(--danger)' : 'var(--primary)';
  t.style.display = 'flex';
  setTimeout(() => t.style.display = 'none', 3000);
}

function getToken() {
  return localStorage.getItem('access_token') || localStorage.getItem('naturalfoods_access_token');
}

async function api(url, method, body) {
  let token = getToken();
  const h = { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const c = { method, headers: h };
  if (body) c.body = JSON.stringify(body);
  const res = await fetch(url, c);
  if ((res.status === 401 || res.status === 403) && token) {
    localStorage.removeItem('access_token');
    localStorage.removeItem('naturalfoods_access_token');
    localStorage.removeItem('refresh_token');
    localStorage.removeItem('naturalfoods_refresh_token');
    window.location.href = '/login/';
  }
  return res;
}

let currentView = 'inbox';
let selectedMsgId = null;

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('msgDetailView').classList.remove('active');
  currentView = tab;
  if (tab === 'inbox') loadInbox();
}

function showDetail(id) {
  selectedMsgId = id;
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('msgDetailView').classList.add('active');
  loadMessageDetail(id);
}

async function deleteMessage(id) {
  if (!confirm('Are you sure you want to delete this message?')) return;
  try {
    const res = await api('/api/messages/' + id + '/delete/', 'DELETE');
    if (res.ok) {
      showToast('Message deleted');
      document.getElementById('msgDetailView').classList.remove('active');
      document.getElementById('tab-inbox').classList.add('active');
      loadInbox();
    } else {
      showToast('Failed to delete message', true);
    }
  } catch (e) { console.error(e); }
}

async function loadInbox() {
  try {
    const res = await api('/api/messages/inbox/');
    if (!res.ok) return;
    const msgs = await res.json();
    const el = document.getElementById('inboxList');
    if (!msgs.length) {
      el.innerHTML = '<div class="empty-state"><i class="fas fa-envelope-open-text"></i><div>No messages in inbox</div></div>';
      return;
    }
    el.innerHTML = msgs.map(m => `
      <div class="msg-item ${m.is_read ? '' : 'unread'}" onclick="showDetail(${m.id})">
        <div class="msg-avatar">${m.sender_email[0].toUpperCase()}</div>
        <div class="msg-body">
          <div class="msg-sender">${m.sender_email}</div>
          <div class="msg-subject">${m.subject}</div>
          <div class="msg-preview">${m.body.slice(0, 80)}${m.body.length > 80 ? '...' : ''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="msg-date">${new Date(m.created_at).toLocaleDateString()}</div>
          ${!m.is_read ? '<div class="msg-status">NEW</div>' : ''}
        </div>
      </div>
    `).join('');
  } catch (e) { console.error(e); }
}

async function loadMessageDetail(id) {
  try {
    const res = await api('/api/messages/' + id + '/');
    if (!res.ok) { showToast('Failed to load message', true); return; }
    const m = await res.json();
    document.getElementById('detailSubject').textContent = m.subject;
    document.getElementById('detailFrom').textContent = m.sender_email;
    document.getElementById('detailTo').textContent = m.recipient_email;
    document.getElementById('detailDate').textContent = new Date(m.created_at).toLocaleString();
    document.getElementById('detailBody').textContent = m.body;
    document.getElementById('replyMsgId').value = m.id;
    document.getElementById('replySenderEmail').value = m.sender_email;
    document.getElementById('replySubject').value = 'Re: ' + m.subject;
    document.getElementById('replyBody').value = '';
    const repliesEl = document.getElementById('detailReplies');
    if (m.replies && m.replies.length) {
      repliesEl.innerHTML = '<h4 style="font-size:0.95rem;font-weight:600;margin-bottom:10px">Replies (' + m.replies.length + ')</h4>' +
        m.replies.map(r => `
          <div class="reply-item">
            <small><strong>${r.sender_email}</strong> on ${new Date(r.created_at).toLocaleString()}</small>
            <p>${r.body}</p>
          </div>
        `).join('');
    } else {
      repliesEl.innerHTML = '';
    }
    document.getElementById('replySection').style.display = 'block';
    api('/api/messages/' + id + '/read/', 'POST').catch(() => {});
    loadUnreadCount();
  } catch (e) { console.error(e); }
}

async function loadUnreadCount() {
  try {
    const res = await api('/api/messages/unread-count/');
    if (!res.ok) return;
    const d = await res.json();
    const badge = document.getElementById('unreadBadge');
    if (d.unread_count > 0) {
      badge.textContent = d.unread_count;
      badge.style.display = 'inline';
    } else {
      badge.style.display = 'none';
    }
  } catch (e) { console.error(e); }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() { switchTab(this.dataset.tab); });
});

document.getElementById('backToListBtn').addEventListener('click', function() {
  document.getElementById('msgDetailView').classList.remove('active');
  document.getElementById('tab-' + currentView).classList.add('active');
});

document.getElementById('replyForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const data = {
    recipient_email: document.getElementById('replySenderEmail').value,
    subject: document.getElementById('replySubject').value,
    body: document.getElementById('replyBody').value,
    parent: parseInt(document.getElementById('replyMsgId').value),
  };
  try {
    const res = await api('/api/messages/compose/', 'POST', data);
    if (res.ok) {
      showToast('Reply sent!');
      document.getElementById('replyBody').value = '';
      if (selectedMsgId) loadMessageDetail(selectedMsgId);
    } else {
      showToast('Failed to send reply', true);
    }
  } catch (e) { console.error(e); }
});

// Dark mode
const themeBtn = document.getElementById('darkModeToggle');
const themeIcon = document.getElementById('darkModeIcon');
if (localStorage.getItem('theme') === 'dark') {
  document.body.classList.add('dark-mode');
  themeIcon.className = 'fas fa-sun';
}
themeBtn.addEventListener('click', function() {
  document.body.classList.toggle('dark-mode');
  const dark = document.body.classList.contains('dark-mode');
  localStorage.setItem('theme', dark ? 'dark' : 'light');
  themeIcon.className = dark ? 'fas fa-sun' : 'fas fa-moon';
});

// Sidebar toggle
document.getElementById('sidebarToggle').addEventListener('click', function() {
  document.getElementById('sidebar').classList.toggle('active');
});

// Init
