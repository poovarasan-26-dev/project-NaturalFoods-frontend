<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 12px; overflow: hidden; }
    .header { background: #2ecc71; padding: 24px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 20px; }
    .body { padding: 24px; color: #333; }
    .body h2 { font-size: 18px; margin: 0 0 8px; }
    .meta { font-size: 13px; color: #888; margin-bottom: 16px; }
    .message-box { background: #f9f9f9; border-left: 4px solid #2ecc71; padding: 16px; border-radius: 8px; white-space: pre-wrap; }
    .footer { padding: 16px 24px; text-align: center; font-size: 12px; color: #aaa; border-top: 1px solid #eee; }
    .btn { display: inline-block; padding: 10px 20px; background: #2ecc71; color: #fff; text-decoration: none; border-radius: 8px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>New Message from {{ sender_name }}</h1>
    </div>
    <div class="body">
      <h2>{{ subject }}</h2>
      <div class="meta">
        From: {{ sender_name }} &lt;{{ sender_email }}&gt;
      </div>
      <div class="message-box">{{ body }}</div>
      <div style="text-align:center;">
        <a href="{{ site_url }}/messages/{{ message_id }}/" class="btn">View Message</a>
      </div>
    </div>
    <div class="footer">
      NaturalFoods &mdash; Erospark Technologies Pvt Ltd
    </div>
  </div>
</body>
</html>
