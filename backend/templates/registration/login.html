{% extends "base.html" %}
{% block title %}Login - CRM System{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon"><i class="fas fa-lock"></i></div>
      <h2>Welcome Back</h2>
      <p class="login-subtitle">Sign in to your account</p>
    </div>
    <form id="loginForm" class="login-form">
      {% csrf_token %}
      <div class="input-group">
        <span class="input-icon"><i class="fas fa-user"></i></span>
        <input type="text" id="username" name="username" class="login-input" placeholder="Username" required>
      </div>
      <div class="input-group">
        <span class="input-icon"><i class="fas fa-key"></i></span>
        <input type="password" id="password" name="password" class="login-input" placeholder="Password" required>
      </div>
      <div id="loginError" class="login-error" style="display:none"></div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
    <div class="login-footer">
      First time? <a href="/register/">Create an account</a>
    </div>
  </div>
</div>

<div id="successToast" class="toast toast-success" style="display:none">Login successful! Redirecting...</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();
  const btn = this.querySelector(".login-btn");
  btn.disabled = true;
  btn.textContent = "Signing in...";
  const data = {
    username: document.getElementById("username").value,
    password: document.getElementById("password").value,
  };
  try {
    const res = await fetch("/api/auth/login/", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data),
    });
    if (res.ok) {
      const json = await res.json();
      localStorage.setItem("access_token", json.access);
      localStorage.setItem("refresh_token", json.refresh);
      localStorage.setItem("naturalfoods_access_token", json.access);
      localStorage.setItem("naturalfoods_refresh_token", json.refresh);
      const toast = document.getElementById("successToast");
      toast.style.display = "block";
      setTimeout(() => { window.location.href = "/dashboard/"; }, 1200);
    } else {
      const err = await res.json();
      document.getElementById("loginError").textContent = err.detail || "Invalid credentials";
      document.getElementById("loginError").style.display = "block";
      btn.disabled = false;
      btn.textContent = "Sign In";
    }
  } catch (e) {
    document.getElementById("loginError").textContent = "Network error";
    document.getElementById("loginError").style.display = "block";
    btn.disabled = false;
    btn.textContent = "Sign In";
  }
});
</script>
{% endblock %}
