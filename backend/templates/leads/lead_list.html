{% extends "base.html" %}
{% block title %}Leads - CRM System{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Leads</h2>
  <a href="/leads/create/" class="btn btn-primary"><i class="fas fa-plus"></i> New Lead</a>
</div>
<table class="table" id="leadsTable">
  <thead>
    <tr>
      <th>Name</th>
      <th>Company</th>
      <th>Status</th>
      <th>Created</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="leadsBody"></tbody>
</table>

<script>
async function loadLeads() {
  const token = localStorage.getItem("access_token");
  if (!token) { window.location.href = "/login/"; return; }
  try {
    const res = await fetch("/api/leads/", {
      headers: {"Authorization": "Bearer " + token},
    });
    if (!res.ok) { window.location.href = "/login/"; return; }
    const leads = await res.json();
    const tbody = document.getElementById("leadsBody");
    tbody.innerHTML = leads.map(l => `
      <tr>
        <td>${l.name}</td>
        <td>${l.company || "-"}</td>
        <td><span class="badge badge-${l.status}">${l.status}</span></td>
        <td>${new Date(l.created_at).toLocaleDateString()}</td>
        <td class="actions">
          <a href="/leads/${l.id}/" class="btn-sm"><i class="fas fa-eye"></i></a>
          <a href="/leads/${l.id}/edit/" class="btn-sm"><i class="fas fa-edit"></i></a>
        </td>
      </tr>
    `).join("");
  } catch (e) { console.error(e); }
}
loadLeads();
</script>
{% endblock %}
